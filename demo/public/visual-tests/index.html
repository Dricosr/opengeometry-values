<!DOCTYPE html>
<html lang="en-US">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Visual Tests - OpenGeometry Value Studio</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/themes/prism-tomorrow.min.css" />
    <link rel="stylesheet" href="/shared/styles.css" />
  </head>
  <body>
    <div class="page-shell">
      <nav class="page-nav" aria-label="Studio sections">
        <div id="navLinks" class="nav-links"></div>
      </nav>

      <main class="visual-layout">
        <article class="panel visual-intro-panel">
          <div class="panel-heading">
            <p class="eyebrow">Validation</p>
            <h2>Run Visual Tests</h2>
          </div>
          <p class="hero-copy">
            Trigger the engineering visual suite from this page to confirm the browser demo still matches the tested quantity flows.
          </p>
          <div class="hero-actions inline-actions">
            <button id="runVisualTestsButton" class="primary-button" type="button">Run Visual Tests</button>
          </div>
        </article>

        <section class="panel shelf-panel visual-runner-panel">
          <div class="panel-heading">
            <p class="eyebrow">Validation</p>
            <h2>Visual Test Runner</h2>
          </div>
          <pre id="visualTestOutput" class="json-block">Run the visual suite to verify the engineering previews.</pre>
        </section>
      </main>
    </div>

    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/prism.min.js"></script>
    <script defer src="https://cdn.jsdelivr.net/npm/prismjs@1.29.0/components/prism-json.min.js"></script>
    <script type="module" src="/visual-tests/app.mjs"></script>
  </body>
</html>
